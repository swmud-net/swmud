name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ libxml2-dev libpqxx-dev libpq-dev

    - name: Build
      run: |
        mkdir -p bin
        cd src
        make MUD_DIR=.. MUD_BIN=swmud CPUs=-j$(nproc)
